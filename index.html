<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#FAFAF8" media="(prefers-color-scheme: light)">
<title>Выходные в Москве</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230A0A0A'/><rect x='9' y='9' width='14' height='14' fill='%23FF4A1C'/></svg>">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<header class="topbar" id="top">
  <div class="wrap bar">
    <a class="brand" href="#top"><span class="sq"></span>Выходные в Москве</a>
    <span class="stamp" id="stamp"></span>
  </div>
</header>

<section class="hero">
  <span class="hero-sq" id="heroSq"></span>
  <div class="wrap">
    <p class="eyebrow">Афиша · Москва</p>
    <h1 class="hero-h">Куда сходить<br>на выходных</h1>
    <p class="hero-sub">Фестивали, забеги, вода, опен-эйры. Без филармонии.</p>
    <nav class="jump">
      <a href="#agenda">Ближайшее</a>
      <a href="#summer">Всё лето</a>
      <a href="#links">Где искать</a>
    </nav>
  </div>
</section>

<div class="filterbar">
  <div class="wrap"><div class="chips" id="filters"></div></div>
</div>

<main class="wrap">
  <div id="agenda"></div>

  <section id="summer" class="block">
    <h2 class="block-h">На всё лето</h2>
    <p class="block-sub">Доступно весь сезон — можно в любой день.</p>
    <div class="cards" id="summer-cards"></div>
  </section>

  <section id="links" class="block">
    <h2 class="block-h">Где ещё искать</h2>
    <div id="links-wrap"></div>
  </section>
</main>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet" role="dialog" aria-modal="true">
    <span class="grab"></span>
    <button class="sheet-close" id="sheetClose" aria-label="Закрыть">×</button>
    <span class="s-cat" id="s-cat"></span>
    <h2 id="s-title"></h2>
    <div class="s-row" id="s-when"></div>
    <div class="s-row" id="s-where"></div>
    <div class="s-row" id="s-price"></div>
    <p class="s-desc" id="s-desc"></p>
    <a class="s-btn" id="s-url" target="_blank" rel="noopener">Регистрация →</a>
  </div>
</div>

<script src="assets/app.js"></script>
</body>
</html>
