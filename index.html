<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Выходные в Москве</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230A0A0A'/><rect x='9' y='9' width='14' height='14' fill='%23FF4D17'/></svg>">
<link rel="stylesheet" href="assets/styles.css">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
</head>
<body>

<header class="hero">
  <div class="wrap hero-inner">
    <div>
      <p class="eyebrow">Афиша · Москва</p>
      <h1 class="wordmark">Выходные<br>в Москве</h1>
      <p class="lede">Куда сходить на выходных — фестивали, забеги, вода, опен-эйры. Без филармонии.</p>
    </div>
    <div class="updated" id="updated">загрузка…</div>
  </div>
</header>

<nav class="tabs">
  <div class="wrap">
    <button class="tab active" data-tab="calendar">Календарь</button>
    <button class="tab" data-tab="summer">Всё лето</button>
    <button class="tab" data-tab="sources">Где ещё искать</button>
  </div>
</nav>

<main class="wrap">

  <!-- КАЛЕНДАРЬ -->
  <section class="panel active" id="tab-calendar">
    <div class="filters" id="filters"></div>
    <div class="cal-grid">
      <aside class="upcoming">
        <div class="up-head">
          <h2>Ближайшее</h2>
          <div class="seg" id="seg">
            <button data-seg="weekend" class="on">Выходные</button>
            <button data-seg="all">Всё</button>
          </div>
        </div>
        <div class="up-list" id="up-list"></div>
      </aside>
      <div class="cal-wrap"><div id="calendar"></div></div>
    </div>
  </section>

  <!-- ВСЁ ЛЕТО -->
  <section class="panel" id="tab-summer">
    <h2 class="sect-title">Всё лето</h2>
    <p class="sect-sub">Доступно весь сезон — можно в любой день.</p>
    <div class="cards" id="summer-cards"></div>
  </section>

  <!-- ГДЕ ЕЩЁ ИСКАТЬ -->
  <section class="panel" id="tab-sources">
    <h2 class="sect-title">Где ещё искать</h2>
    <p class="sect-sub">Афиши и телеграм-каналы про события Москвы.</p>
    <div id="links"></div>
  </section>

</main>

<!-- МОДАЛКА -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <button class="m-close" id="m-close" aria-label="Закрыть">×</button>
    <span class="m-cat" id="m-cat"></span>
    <h2 id="m-title"></h2>
    <div class="m-row" id="m-when"></div>
    <div class="m-row" id="m-where"></div>
    <div class="m-row" id="m-price"></div>
    <p class="m-desc" id="m-desc"></p>
    <a class="m-btn" id="m-url" target="_blank" rel="noopener">Подробнее и запись ↗</a>
  </div>
</div>

<script src="assets/app.js"></script>
</body>
</html>
