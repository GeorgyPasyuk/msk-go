name: update-events

on:
  schedule:
    - cron: '37 6 * * *'       # 09:37 МСК; «кривая» минута — меньше шанс, что GitHub отбросит запуск
  workflow_dispatch:           # можно запустить руками из вкладки Actions

permissions:
  contents: write

concurrency:
  group: update-events
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ТГ — первым: fetch_events вливает извлечённые ТГ-события в общий events.json
      - name: Fetch telegram feed
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: python3 scripts/fetch_telegram.py

      - name: Fetch events
        env:
          TIMEPAD_TOKEN: ${{ secrets.TIMEPAD_TOKEN }}
        run: python3 scripts/fetch_events.py

      - name: Commit if changed
        run: |
          git config user.name  "msk-go-bot"
          git config user.email "msk-go-bot@users.noreply.github.com"
          git add data/events.json data/telegram.json data/tg_cache.json data/geo_cache.json
          if git diff --staged --quiet; then
            echo "Нет изменений в events.json"
          else
            git commit -m "data: refresh events $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
