name: update-events

on:
  schedule:
    - cron: '0 5 * * *'        # 08:00 МСК ежедневно
  workflow_dispatch:           # можно запустить руками из вкладки Actions

permissions:
  contents: write

concurrency:
  group: update-events
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch events
        run: python3 scripts/fetch_events.py

      - name: Commit if changed
        run: |
          git config user.name  "msk-go-bot"
          git config user.email "msk-go-bot@users.noreply.github.com"
          git add data/events.json
          if git diff --staged --quiet; then
            echo "Нет изменений в events.json"
          else
            git commit -m "data: refresh events $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
