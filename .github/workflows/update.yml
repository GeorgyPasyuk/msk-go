name: update-events

on:
  schedule:
    - cron: '37 6 * * *'       # 09:37 МСК; «кривая» минута — меньше шанс, что GitHub отбросит запуск
  workflow_dispatch:           # можно запустить руками из вкладки Actions

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-events
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ТГ — первым: fetch_events вливает извлечённые ТГ-события в общий events.json
      - name: Fetch telegram feed
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: python3 scripts/fetch_telegram.py

      - name: Fetch events
        env:
          TIMEPAD_TOKEN: ${{ secrets.TIMEPAD_TOKEN }}
        run: python3 scripts/fetch_events.py

      - name: Commit if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "msk-go-bot"
          git config user.email "msk-go-bot@users.noreply.github.com"
          git add data/events.json data/telegram.json data/tg_cache.json data/geo_cache.json
          if git diff --staged --quiet; then
            echo "Нет изменений в events.json"
            exit 0
          fi
          git commit -m "data: refresh events $(date -u +%Y-%m-%dT%H:%MZ)"
          # Try direct push to main; if main is protected (require-PR), fall back to a
          # self-merged PR (GITHUB_TOKEN is allowed to merge under a 0-approval rule).
          if git push 2>/tmp/push.err; then
            echo "pushed directly to main"
          else
            cat /tmp/push.err
            echo "direct push rejected (protected branch) -> delivering via PR"
            BR="data/auto-refresh-$(date -u +%Y%m%d-%H%M%S)"
            git push -u origin "HEAD:$BR"
            gh pr create -R "$GITHUB_REPOSITORY" --base main --head "$BR" \
              --title "data: refresh events" --body "Automated data refresh (cron)." || echo "PR exists"
            gh pr merge -R "$GITHUB_REPOSITORY" "$BR" --squash --delete-branch
          fi
