name: auto-pr
# Deterministic delivery: when an agent pushes a feature branch, auto-open a PR and
# enable auto-merge (merges to main once CI is green). Agent only writes code; the rest is plumbing.
on:
  push:
    branches: ['gst-*', 'agent/*', 'feat/*']
permissions:
  contents: write
  pull-requests: write
jobs:
  open-and-automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Open PR + enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BR="${GITHUB_REF_NAME}"
          gh pr create -R "$GITHUB_REPOSITORY" --base main --head "$BR" \
            --title "$BR" --body "Auto-PR (deterministic delivery) for branch \`$BR\`." \
            || echo "PR already exists for $BR"
          gh pr merge -R "$GITHUB_REPOSITORY" "$BR" --squash --auto --delete-branch \
            || echo "auto-merge enable failed (will rely on green CI)"
