name: auto-pr
# Deterministic delivery, self-contained (no downstream-workflow dependency to avoid
# GITHUB_TOKEN recursive-trigger limits): on a feature-branch push ->
#   1) CI gate (same checks as ci.yml), 2) create PR + squash-merge to main, 3) deploy to VPS.
on:
  push:
    branches: ['gst-*', 'agent/*', 'feat/*']
permissions:
  contents: write
  pull-requests: write
jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: CI gate (py/json/js/index)
        run: |
          python3 -m py_compile scripts/*.py
          python3 -c "import json; json.load(open('data/curated.json'))"
          node --check assets/app.js
          test -f index.html
      - name: Visual QA gate (headless chromium)
        # Runtime + VISUAL check on the BRANCH before merge: console/page errors,
        # content render, CSS structural lint, and floating-control OVERLAP detection
        # (the class of bug that shipped via MSK-2: stacked back-to-top buttons /
        # scroll-hint colliding with the orange "наверх" button at bottom-right).
        # Fails the job -> the merge step below never runs -> bad UI never reaches prod.
        run: |
          npm i --no-save playwright@1.61.1
          npx playwright install --with-deps chromium
          python3 -m http.server 8099 --bind 127.0.0.1 &
          SRV=$!
          sleep 2
          node tests/visual-gate.mjs "http://127.0.0.1:8099/"
          rc=$?
          kill $SRV 2>/dev/null || true
          exit $rc
      - name: Create PR + merge to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BR="${GITHUB_REF_NAME}"
          gh pr create -R "$GITHUB_REPOSITORY" --base main --head "$BR" --title "$BR" --body "Auto-delivery (CI gate passed in workflow)." || echo "PR exists"
          gh pr merge -R "$GITHUB_REPOSITORY" "$BR" --squash --delete-branch
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: deploy
