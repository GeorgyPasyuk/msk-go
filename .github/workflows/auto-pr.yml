name: auto-pr
# VERIFY-GATE delivery. Merge to main is GATED on the `qa:pass` label, which the QA
# agent applies ONLY after verifying the change against the CEO Definition of Done on
# the preview branch. This kills fake-done: the coder pushes, but nothing reaches prod
# until QA verifies. Two paths:
#   1) on push of a feature branch -> CI gate + visual-gate + open/refresh PR. NO merge.
#      The PR waits for `qa:pass`.
#   2) on the PR getting the `qa:pass` label -> re-run CI + visual-gate (safety; the
#      deterministic gate still blocks broken code even if QA mislabels) -> squash-merge
#      -> deploy to VPS.
on:
  push:
    branches: ['gst-*', 'agent/*', 'feat/*']
  pull_request:
    types: [labeled]
permissions:
  contents: write
  pull-requests: write
jobs:
  # PATH 1: feature-branch push -> gate + open PR, but DO NOT merge (await qa:pass).
  prepare:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: CI gate (py/json/js/index)
        run: |
          python3 -m py_compile scripts/*.py
          python3 -c "import json; json.load(open('data/curated.json'))"
          node --check assets/app.js
          test -f index.html
      - name: Visual QA gate (headless chromium)
        # Deterministic runtime+visual check: console/page errors, content render,
        # CSS structural lint, floating-control OVERLAP. Blind to semantics / "should be
        # gone" — that is the QA agent's DoD job. Fails the job -> PR is not created clean.
        run: |
          npm i --no-save playwright@1.61.1
          npx playwright install --with-deps chromium
          python3 -m http.server 8099 --bind 127.0.0.1 &
          SRV=$!
          sleep 2
          node tests/visual-gate.mjs "http://127.0.0.1:8099/"
          rc=$?
          kill $SRV 2>/dev/null || true
          exit $rc
      - name: Open PR (NO merge — awaits qa:pass)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BR="${GITHUB_REF_NAME}"
          gh pr create -R "$GITHUB_REPOSITORY" --base main --head "$BR" --title "$BR" \
            --body "Auto-delivery: CI + visual-gate passed. AWAITING QA verification against the Definition of Done. Merge happens only when QA adds the \`qa:pass\` label." \
            || echo "PR exists"
          echo "PR opened/updated for $BR — merge is gated on the qa:pass label."

  # PATH 2: PR labeled qa:pass -> re-verify deterministic gate, then merge + deploy.
  merge:
    if: github.event_name == 'pull_request' && github.event.label.name == 'qa:pass'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: CI gate (py/json/js/index)
        run: |
          python3 -m py_compile scripts/*.py
          python3 -c "import json; json.load(open('data/curated.json'))"
          node --check assets/app.js
          test -f index.html
      - name: Visual QA gate (headless chromium) — re-verify before merge
        run: |
          npm i --no-save playwright@1.61.1
          npx playwright install --with-deps chromium
          python3 -m http.server 8099 --bind 127.0.0.1 &
          SRV=$!
          sleep 2
          node tests/visual-gate.mjs "http://127.0.0.1:8099/"
          rc=$?
          kill $SRV 2>/dev/null || true
          exit $rc
      - name: Merge qa:pass PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge -R "$GITHUB_REPOSITORY" "${{ github.event.pull_request.number }}" --squash --delete-branch
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: deploy
